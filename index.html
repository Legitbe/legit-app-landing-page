@font-face {
  font-family: "Peace Sans";
  src: url("/fonts/peace_sans.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
    :root {
    --bg: #FAFAF7;
    --ink: #0A0A0A;
    --ink-2: #1A1A1A;
    --muted: #6B6B6B;
    --line: #E8E8E3;
    --line-strong: #D4D4CE;
    --grad-from: #b80050;
    --grad-to: #3c00cf;
    --gradient: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-to) 100%);
    --font-display: "Peace Sans", "Boldonse", "Big Shoulders Display", "Helvetica Neue", sans-serif;
    --font-body: "Poppins", system-ui, sans-serif;
    --anim-scale: 1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  body { font-weight: 400; line-height: 1.5; }
  ::selection { background: var(--grad-from); color: white; }

  /* utility */
  .grad-text {
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .grad-bg { background: var(--gradient); }
  .grad-pill-text {
    background: var(--gradient);
    color: white;
    padding: 0 0.18em;
    border-radius: 0.12em;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  /* reveal — defaults to visible; JS adds .pre-reveal to hide, then .in to show */
  .reveal { transition: opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1); transition-delay: var(--d, 0ms); }
  .reveal.pre-reveal { opacity: 0; transform: translateY(28px); }
  .reveal.in { opacity: 1; transform: none; }

  /* 3D bg objects */
  .bg-spheres {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(86px);
    opacity: 0.31;
    will-change: transform;
  }
  .s1 { width: 750px; height: 750px; left: -160px; top: 6vh; background: radial-gradient(circle at 30% 30%, #ff4d97, #b80050 60%, transparent 70%); }
  .s2 { width: 980px; height: 980px; right: -260px; top: 78vh; background: radial-gradient(circle at 30% 30%, #6a4dff, #3c00cf 60%, transparent 70%); }
  .s3 { width: 605px; height: 605px; left: 36vw; top: 220vh; background: radial-gradient(circle at 30% 30%, #c0a8ff, #3c00cf 60%, transparent 70%); }
  .s4 { width: 520px; height: 520px; right: 8vw; top: 360vh; background: radial-gradient(circle at 30% 30%, #ff9ec5, #b80050 60%, transparent 70%); }

  /* main container above bg */
  #app { position: relative; z-index: 1; }

  /* nav */
  header.nav {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    display: flex; align-items: center; gap: 24px;
    padding: 10px 14px 10px 18px;
    background: rgba(250, 250, 247, 0.72);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(10,10,10,0.06);
    border-radius: 100px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }
  .nav .logo { display: inline-flex; align-items: center; }
  .nav .logo img { height: 26px; width: auto; display: block; }
  .nav a { color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 500; }
  .nav a:hover { opacity: 0.6; }
  .nav .cta {
    background: var(--ink); color: white; padding: 8px 16px; border-radius: 100px; font-size: 13px;
  }
  .nav .cta:hover { opacity: 1; background: var(--ink-2); }

  /* iPhone frame */
  .iphone {
    width: 320px; aspect-ratio: 9/19.5;
    background: #0a0a0a;
    border-radius: 48px;
    padding: 12px;
    box-shadow:
      0 0 0 2px #2a2a2a,
      0 30px 60px -15px rgba(0,0,0,0.35),
      0 80px 100px -50px rgba(184,0,80,0.25),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
  }
  .iphone .screen {
    width: 100%; height: 100%;
    background: white;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
  }
  .iphone .notch {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px;
    background: #0a0a0a;
    border-radius: 100px;
    z-index: 5;
  }
  .iphone iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }
  .iphone .side-btn {
    position: absolute; left: -2px; width: 4px; background: #2a2a2a;
  }
  .iphone .side-btn.b1 { top: 110px; height: 36px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.b2 { top: 160px; height: 60px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.b3 { top: 230px; height: 60px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.r1 { right: -2px; left: auto; top: 180px; height: 90px; border-radius: 0 2px 2px 0; }

  /* Stats */
  .stats-band {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    padding-top: 16px;
  }
  .stat { padding: 36px 40px; border-right: 1px solid var(--line); position: relative; overflow: visible; }
  .stat:last-child { border-right: 0; }
  .stat .num {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 72px);
    line-height: 1.05;
    letter-spacing: -0.03em;
  }
  .stat .label {
    margin-top: 14px; font-size: 14px; color: var(--muted); max-width: 32ch;
  }
  @media (max-width: 800px){
    .stats-band { grid-template-columns: 1fr; }
    .stat { border-right: 0; border-bottom: 1px solid var(--line); }
    .stat:last-child { border-bottom: 0; }
  }

  /* Why — full-width editorial */
  .why-grid {
    padding: 96px 60px;
    display: flex; flex-direction: column;
    gap: 72px;
    align-items: stretch;
  }
  .why-head { max-width: 900px; }
  .why-head h2 {
    font-family: var(--font-display);
    font-size: clamp(40px, 5.2vw, 72px);
    line-height: 0.92;
    letter-spacing: -0.025em;
  }
  .why-block {
    display: flex; flex-direction: column;
    max-width: 1200px;
  }
  .why-block .num {
    font-family: "Space Grotesk", monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: block;
  }
  .why-block .block-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.4vw, 48px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 20px 0;
  }
  .why-block p { margin: 0; }
  .why-block p.constat {
    font-size: clamp(20px, 1.9vw, 28px);
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: var(--ink-2);
    max-width: 800px;
    font-weight: 400;
  }
  .why-block p.lede {
    font-size: clamp(17px, 1.4vw, 21px);
    line-height: 1.5;
    color: var(--ink);
    max-width: 800px;
    letter-spacing: -0.005em;
  }
  .why-quote {
    position: relative;
    padding-left: 32px;
    margin: 32px 0;
    font-family: var(--font-display);
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    max-width: 900px;
  }
  .why-quote::before {
    content: "";
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 4px;
    background: linear-gradient(180deg, #B90051, #3C00CF);
    border-radius: 2px;
  }
  .why-quote-attr {
    display: block;
    margin-top: 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .mosaic {
    display: grid;
    gap: 12px;
    height: 480px;
    margin-top: 16px;
  }
  .mosaic-left-big {
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .mosaic-left-big .m-1 { grid-row: 1 / span 2; grid-column: 1; }
  .mosaic-left-big .m-2 { grid-row: 1; grid-column: 2; }
  .mosaic-left-big .m-3 { grid-row: 2; grid-column: 2; }
  .mosaic-right-big {
    grid-template-columns: 1fr 2fr;
    grid-template-rows: 1fr 1fr;
  }
  .mosaic-right-big .m-1 { grid-row: 1; grid-column: 1; }
  .mosaic-right-big .m-2 { grid-row: 2; grid-column: 1; }
  .mosaic-right-big .m-3 { grid-row: 1 / span 2; grid-column: 2; }
  .mosaic figure {
    margin: 0;
    border-radius: 20px;
    overflow: hidden;
    background: #ebebe5;
  }
  .mosaic img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  @media (max-width: 900px) {
    .why-grid { padding: 56px 20px; gap: 48px; }
    .mosaic {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      height: auto;
    }
    .mosaic figure { height: 220px; }
    .mosaic-left-big .m-1, .mosaic-left-big .m-2, .mosaic-left-big .m-3,
    .mosaic-right-big .m-1, .mosaic-right-big .m-2, .mosaic-right-big .m-3 {
      grid-column: 1; grid-row: auto;
    }
    .why-quote { padding-left: 20px; margin: 24px 0; }
  }
  .stabilo {
    background: linear-gradient(90deg, var(--grad-from), var(--grad-to));
    color: #fff;
    -webkit-text-fill-color: #fff;
    padding: 0.05em 0.22em;
    border-radius: 0.18em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    font-weight: 500;
  }
  /* Pillars */
  .pillars {
    padding: 80px 60px;
  }
  .pillars-head { display: flex; align-items: end; justify-content: space-between; gap: 40px; margin-bottom: 48px; }
  .pillars-head h2 {
    font-family: var(--font-display);
    font-size: clamp(42px, 5vw, 88px);
    line-height: 0.88;
    letter-spacing: -0.03em;
    max-width: 14ch;
  }
  .pillars-head .meta { font-family: "Space Grotesk", monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.12em; min-width: 200px; text-align: right; }
  .pillar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .pillar {
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 32px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    min-height: 460px;
    display: flex; flex-direction: column;
    position: relative;
    transition: transform 0.6s cubic-bezier(.2,.7,.2,1), box-shadow 0.6s, border-color 0.4s;
    overflow: hidden;
  }
  .pillar:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 60px -20px rgba(184,0,80,0.18), 0 20px 40px -25px rgba(60,0,207,0.18);
    border-color: transparent;
  }
  .pillar::before {
    content: ""; position: absolute; inset: 0; padding: 1px; border-radius: 28px;
    background: var(--gradient);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  .pillar:hover::before { opacity: 1; }
  .pillar .idx {
    font-family: "Space Grotesk", monospace; font-size: 12px; letter-spacing: 0.15em; color: var(--muted);
  }
  .pillar h3 {
    font-family: var(--font-display);
    font-size: 28px; line-height: 1.1; letter-spacing: -0.02em;
    margin-top: 24px;
    flex: 1;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
  }
  .pillar p {
    color: var(--muted); font-size: 15px; line-height: 1.55;
    margin-top: 24px;
  }
  .pillar .visual {
    margin-top: 28px;
    height: 160px;
    border-radius: 18px;
    background: linear-gradient(135deg, #f5f5f0 0%, #ebebe5 100%);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  @media (max-width: 900px){
    .pillars { padding: 56px 20px; }
    .pillar-grid { grid-template-columns: 1fr; }
    .pillar { min-height: auto; padding: 24px; }
    .pillar h3 { font-size: 24px; }
  }

  /* Team */
  .team { padding: 80px 60px; border-top: 1px solid var(--line); }
  .team h2 {
    font-family: var(--font-display);
    font-size: clamp(42px, 5vw, 88px);
    line-height: 0.88;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .team .intro { max-width: 60ch; font-size: 18px; color: var(--muted); margin-bottom: 48px; }
  .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .person {
    aspect-ratio: 3/4;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 24px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: rgba(255,255,255,0.5);
    transition: transform 0.5s, background 0.4s;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .person:hover {
    transform: translateY(-6px);
    background: var(--ink);
    color: var(--bg);
  }
  .person:hover .role { color: rgba(255,255,255,0.6); }
  .person .name { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em; line-height: 1; }
  .person .age { font-family: "Space Grotesk", monospace; font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.1em; }
  .person:hover .age { color: rgba(255,255,255,0.5); }
  .person .role { font-size: 14px; line-height: 1.4; color: var(--ink-2); transition: color 0.4s; max-width: 18ch; }
  .person .li {
    font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; opacity: 0.5;
    display: flex; align-items: center; gap: 6px;
  }
  .person:hover .li { opacity: 1; }
  @media (max-width: 900px){
    .team { padding: 56px 20px; }
    .team-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .person { padding: 18px; border-radius: 18px; }
    .person .name { font-size: 22px; }
  }

  /* Contact */
  .contact {
    padding: 80px 60px;
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  }
  .contact h2 {
    font-family: var(--font-display);
    font-size: clamp(36px, 4.2vw, 68px);
    line-height: 0.88;
    letter-spacing: -0.02em;
  }
  .contact .sub { color: var(--muted); font-size: 17px; line-height: 1.5; margin-top: 24px; max-width: 40ch; }
  .form { display: flex; flex-direction: column; gap: 4px; }
  .form .field {
    border-bottom: 1px solid var(--line);
    padding: 18px 0 14px;
  }
  .form label {
    font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
    display: block; margin-bottom: 6px;
  }
  .form input, .form textarea {
    width: 100%; border: 0; background: transparent;
    font-family: var(--font-body); font-size: 17px;
    outline: none; color: var(--ink);
    resize: none;
  }
  .form .field:focus-within { border-bottom-color: var(--ink); }
  .form button {
    margin-top: 24px;
    background: var(--ink); color: white;
    border: 0; border-radius: 100px;
    padding: 18px 28px;
    font-family: var(--font-body); font-size: 15px; font-weight: 500;
    cursor: pointer;
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 10px;
    transition: transform 0.3s, background 0.3s;
  }
  .form button:hover { transform: translateY(-2px); background: var(--ink-2); }
  .form button .arrow { transition: transform 0.3s; }
  .form button:hover .arrow { transform: translateX(4px); }
  @media (max-width: 900px){
    .contact { grid-template-columns: 1fr; padding: 56px 20px; gap: 32px; }
  }

  /* Footer */
  footer {
    padding: 40px 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: end; gap: 40px;
    flex-wrap: wrap;
  }
  footer .big { font-family: var(--font-display); font-size: clamp(80px, 14vw, 240px); line-height: 0.85; letter-spacing: -0.05em; }
  footer .meta { font-size: 13px; color: var(--muted); }
  footer .links { display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
  footer .links a { color: var(--ink); text-decoration: none; }
  footer .links a:hover { color: var(--muted); }

  /* CTA buttons */
  .cta-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--ink); color: white;
    padding: 16px 24px; border-radius: 100px;
    font-size: 15px; font-weight: 500;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 12px;
    cursor: pointer; border: 0;
    transition: transform 0.3s, background 0.3s;
    font-family: var(--font-body);
  }
  .btn-primary:hover { transform: translateY(-2px); background: var(--ink-2); }
  .btn-primary .arrow { transition: transform 0.3s; }
  .btn-primary:hover .arrow { transform: translateX(4px); }
  .arrow-mobile { display: none; }
  .btn-secondary {
    background: transparent; color: var(--ink);
    padding: 14px 22px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    text-decoration: none;
    border: 1px solid var(--line-strong);
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 0.3s, border-color 0.3s;
    font-family: var(--font-body);
  }
  .btn-secondary:hover { background: var(--ink); color: white; border-color: var(--ink); }

  /* Pill badge */
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);

  .pill .dot {

    background: var(--gradient);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Hero A */
  .hero-a {
    min-height: 90vh;
    padding: 100px 24px 56px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    position: relative;
  }
  .hero-a .pill-row { margin-bottom: 32px; }
  .hero-a h1 {
    font-family: var(--font-display);
    font-size: clamp(56px, 10vw, 180px);
    line-height: 0.82;
    letter-spacing: -0.045em;
    max-width: 16ch;
    margin: 0 auto;
  }
  .hero-a .h1-q { display: block; }
  .hero-a .sub {
    margin-top: 40px;
    font-size: clamp(16px, 1.4vw, 21px);
    line-height: 1.5;
    color: var(--muted);
    max-width: 64ch;
    margin-left: auto; margin-right: auto;
  }
  .hero-a .iphone-wrap {
    margin-top: 40px;
    perspective: 1400px;
    position: relative;
  }
  .hero-a .ctas { margin-top: 28px; justify-content: center; }
  .hero-a .marquee-anchor {
    margin-top: 28px;
    font-family: "Space Grotesk", monospace; font-size: 12px;
    letter-spacing: 0.2em; color: var(--muted);
    display: flex; align-items: center; gap: 12px;
  }
  .hero-a .marquee-anchor .line { width: 60px; height: 1px; background: var(--line-strong); }

  /* Hero B */
  .hero-b {
    min-height: 58vh;
    padding: 64px 60px 36px;

    gap: 22px;
    align-items: stretch;
    position: relative;

  .hero-b h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 8vw, 140px);
    line-height: 0.85;
    letter-spacing: -0.045em;
  }
  .hero-b .sub { margin-top: 0; font-size: 19px; line-height: 1.5; color: var(--muted); max-width: 50ch; background: linear-gradient(135deg, rgba(185,0,81,0.12), rgba(60,0,207,0.12)); border-radius: 12px; padding: 16px 20px; }
  .hero-b .ctas { margin-top: 0; }
  .hero-b .iphone-wrap { display: flex; justify-content: center; perspective: 1400px; }
  .hero-b .iphone { transform: rotateY(-8deg) rotateX(4deg); }
  .hero-b .side-meta {
    position: absolute; right: 60px; top: 120px;
    font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.2em;

  .hero-b > div:first-child .pill-row .btn-icon { width: 40px; height: 40px; }
  .hero-b .iphone-wrap { order: 4; align-self: center; }
  .hero-b > div:first-child .sub { order: 5; }

  @media (max-width: 1000px) {
    .hero-b { padding: 80px 20px 40px; gap: 20px; }
    .hero-b .side-meta { display: none; }
    .hero-a { padding: 96px 20px 48px; min-height: auto; }

  }
  @media (max-width: 600px) {
    .iphone { width: 260px; border-radius: 40px; padding: 10px; }
    .iphone .screen { border-radius: 30px; }
  }

  /* Hero toggle */
  .hero-toggle {
    position: fixed; bottom: 24px; left: 24px;
    z-index: 40;
    display: flex; gap: 4px;
    padding: 4px;
    background: rgba(10,10,10,0.92);

    border-radius: 100px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);

  .hero-toggle button {
    border: 0; background: transparent; color: rgba(255,255,255,0.6);
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    padding: 10px 18px; border-radius: 100px; cursor: pointer;
    transition: all 0.3s; letter-spacing: 0.04em;
  }
  .hero-toggle button.active {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,

// ---------- Reveal hook (IntersectionObserver) ----------
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    // Add hidden state, then one-shot synchronous pass for elements already in view
    els.forEach((el) => el.classList.add("pre-reveal"));
    requestAnimationFrame(() => {
      els.forEach((el) => {
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight && r.bottom > 0) {
          el.classList.add("in");
        }
      });
    });
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => {if (!el.classList.contains("in")) io.observe(el);});
    return () => io.disconnect();
  }, []);
}

// ---------- Parallax 3D spheres ----------
function BgSpheres({ enabled, intensity }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!enabled) return;
    const factor = intensity === "subtle" ? 0.04 : intensity === "marked" ? 0.08 : 0.14;
    const onScroll = () => {
      const y = window.scrollY;
      const root = ref.current;
      if (!root) return;
      const spheres = root.querySelectorAll(".sphere");
      spheres.forEach((s, i) => {
        const dir = i % 2 === 0 ? 1 : -1;
        const speed = (i + 1) * factor;
        s.style.transform = `translate3d(0, ${y * speed * dir}px, 0)`;
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [enabled, intensity]);
  if (!enabled) return null;
  return (
    <div ref={ref} className="bg-spheres" aria-hidden="true">
      <div className="sphere s1"></div>
      <div className="sphere s2"></div>
      <div className="sphere s3"></div>
      <div className="sphere s4"></div>
    </div>);

}

function Iphone({ url }) {

    <div className="iphone">

          onLoad={() => console.log('iPhone demo loaded')} />
      </div>
    </div>);

}

function Pillars() {
  // FIX 4 + 5 — interactivity for the mini-simulator and mini-barometer.
  // One delegated listener per widget. No throttling, no rAF, direct textContent updates.
  useEffect(() => {
    // Simulator — reproduces legit-app3 carbon-tax config (coef 0.032, direction negative).
    const simRange = document.querySelector("[data-sim-range]");
    const simValue = document.querySelector("[data-sim-value]");
    const simResult = document.querySelector("[data-sim-result]");
    const simTabs = document.querySelector("[data-sim-tabs]");
    const simPanels = document.querySelectorAll("[data-sim-panel]");

    function renderSim() {
      if (!simRange) return;
      const km = parseInt(simRange.value, 10) || 0;
      if (simValue) simValue.textContent = km + " km";
      const cost = -Math.round(km * 0.032);
      if (simResult) simResult.textContent = cost + " €/mois";
    }

    function onSimInput() { renderSim(); }
    function onSimTabClick(e) {
      const btn = e.target.closest(".sim-mini-tab");
      if (!btn || !simTabs) return;
      simTabs.querySelectorAll(".sim-mini-tab").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      const mode = btn.getAttribute("data-mode") || "me";
      simPanels.forEach((p) => { p.hidden = p.getAttribute("data-sim-panel") !== mode; });
    }

    if (simRange) simRange.addEventListener("input", onSimInput);
    if (simTabs) simTabs.addEventListener("click", onSimTabClick);
    renderSim();

    // ── Barometer ──
    const baroEmojis = document.querySelector("[data-baro-emojis]");
    const baroPcts = document.querySelector("[data-baro-pcts]");
    let baroValues = [21, 15, 33, 5, 26];
    let baroSelected = -1;

    function renderBaro() {
      if (!baroPcts) return;
      const spans = baroPcts.querySelectorAll("span");
      baroValues.forEach((v, i) => {
        if (spans[i]) spans[i].textContent = Math.round(v) + "%";
      });
    }
    function onBaroClick(e) {
      const btn = e.target.closest(".baro-mini-emoji");
      if (!btn || !baroEmojis) return;
      const idx = parseInt(btn.getAttribute("data-baro-idx"), 10);
      if (isNaN(idx)) return;
      baroEmojis.querySelectorAll(".baro-mini-emoji").forEach((b) => b.classList.remove("selected"));
      btn.classList.add("selected");
      // Bump chosen segment by 1 point, redistribute proportionally over the others.
      const total = baroValues.reduce((a, b) => a + b, 0);
      const bump = 1;
      const newSelected = baroValues[idx] + bump;
      const remainingTotal = total - baroValues[idx];
      const newRemainingTotal = total - newSelected;
      baroValues = baroValues.map((v, i) => {
        if (i === idx) return newSelected;
        return remainingTotal > 0 ? v * (newRemainingTotal / remainingTotal) : v;
      });
      // Renormalize to 100 to absorb rounding drift.
      const sum = baroValues.reduce((a, b) => a + b, 0);
      baroValues = baroValues.map((v) => v * (100 / sum));
      baroSelected = idx;
      renderBaro();
    }
    if (baroEmojis) baroEmojis.addEventListener("click", onBaroClick);

    return () => {
      if (simRange) simRange.removeEventListener("input", onSimInput);
      if (simTabs) simTabs.removeEventListener("click", onSimTabClick);
      if (baroEmojis) baroEmojis.removeEventListener("click", onBaroClick);
    };
  }, []);

  return (

        <article className="pillar reveal" style={{ "--d": "100ms" }}>

// ---------- Contact ----------
function Contact() {
  const [data, setData] = useState({ name: "", email: "", org: "", message: "", _hp: "" });
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null); // null | 'success' | 'error'
  const [errMsg, setErrMsg] = useState("");

  const onSubmit = async (e) => {
    e.preventDefault();
    if (data._hp) return; // honeypot
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const name = data.name.trim();
    const email = data.email.trim();
    const org = data.org.trim();
    const message = data.message.trim();
    if (!emailRe.test(email)) { setStatus('error'); setErrMsg("Adresse email invalide."); return; }
    if (name.length < 2) { setStatus('error'); setErrMsg("Nom trop court (min. 2 caractères)."); return; }
    if (message.length < 10) { setStatus('error'); setErrMsg("Message trop court (min. 10 caractères)."); return; }
    setLoading(true); setStatus(null);
    try {
      const sb = window.__supabase;
      if (!sb) throw new Error("Service indisponible.");
      const insertPromise = sb.from('contacts').insert({
        name: name.slice(0, 100),
        email: email.slice(0, 200),
        message: message.slice(0, 2000),
      });
      const timeoutPromise = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000));
      const { error } = await Promise.race([insertPromise, timeoutPromise]);
      if (error) throw error;
      setStatus('success');
      setData({ name: "", email: "", org: "", message: "", _hp: "" });
    } catch (err) {
      setStatus('error');
      setErrMsg(err.message === 'timeout' ? "Délai dépassé, réessaie." : "Une erreur est survenue. Écris-nous directement.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <section className="contact" id="contact">
      <div>
        <div className="section-tag reveal">Contact</div>
        <h2 className="reveal" style={{ "--d": "80ms", lineHeight: "1.05" }}>
          Construisons Legit avec les <span className="grad-text" style={{ lineHeight: "1.05" }}>bons partenaires</span>.
        </h2>
        <p className="sub reveal" style={{ "--d": "160ms", color: "rgb(52, 52, 52)", fontWeight: "500" }}>Tu représentes une institution, un média ou tu es investisseur ? On veut te parler.</p>
        <div className="reveal" style={{ "--d": "240ms", marginTop: 40, fontSize: 14, color: "var(--muted)" }}>
          Direct&nbsp;: <a href={`mailto:${CONTACT_EMAIL}`} style={{ color: "var(--ink)", textDecoration: "underline", textUnderlineOffset: 4 }}>{CONTACT_EMAIL}</a>
        </div>
      </div>
      {status === 'success' ? (
        <div className="form reveal" style={{ "--d": "100ms", gap: "16px", justifyContent: "center", minHeight: 260 }}>
          <p style={{ fontSize: 36 }}>✓</p>
          <p style={{ fontWeight: 700, fontSize: 20 }}>Message reçu !</p>
          <p style={{ color: "var(--muted)", fontSize: 15 }}>On revient vers toi rapidement.</p>
          <button type="button" onClick={() => setStatus(null)}>Envoyer un autre message</button>
        </div>
      ) : (
        <form className="form reveal" onSubmit={onSubmit} style={{ "--d": "100ms" }}>
          <div style={{ position: "absolute", width: 0, height: 0, overflow: "hidden", opacity: 0 }} aria-hidden="true">
            <input tabIndex={-1} autoComplete="off" name="website" value={data._hp} onChange={(e) => setData({ ...data, _hp: e.target.value })} />
          </div>
          <div className="field">
            <label>Nom</label>
            <input required value={data.name} onChange={(e) => setData({ ...data, name: e.target.value })} placeholder="Marie Dubois" />
          </div>
          <div className="field">
            <label>Email</label>
            <input required type="email" value={data.email} onChange={(e) => setData({ ...data, email: e.target.value })} placeholder="marie@institution.be" />
          </div>
          <div className="field">
            <label>Organisation</label>
            <input value={data.org} onChange={(e) => setData({ ...data, org: e.target.value })} placeholder="Institution / Média / Fonds" />
          </div>
          <div className="field">
            <label>Message</label>
            <textarea required rows={3} value={data.message} onChange={(e) => setData({ ...data, message: e.target.value })} placeholder="Dis-nous en quelques mots ce qui t'amène." />
          </div>
          {status === 'error' && <p style={{ color: "#b80050", fontSize: 13, marginTop: 4 }}>{errMsg}</p>}
          <button type="submit" disabled={loading} style={{ opacity: loading ? 0.65 : 1, cursor: loading ? "not-allowed" : "pointer" }}>
            {loading ? "Envoi en cours…" : <React.Fragment>Envoyer le message <span className="arrow">→</span></React.Fragment>}
          </button>
        </form>
      )}
    </section>);

}

// ---------- Hero toggle ----------
// ---------- Tweaks ----------
function TweaksUI({ tweaks, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Direction artistique">
        <TweakSelect
          label="Couleur d'accent"
          value={tweaks.gradient}
          onChange={(v) => setTweak("gradient", v)}
          options={[
          { value: "magenta-blue", label: "Magenta → Bleu (défaut)" },
          { value: "amber-magenta", label: "Ambre → Magenta" },
          { value: "violet-cyan", label: "Violet → Cyan" },
          { value: "lime-emerald", label: "Lime → Émeraude" },
          { value: "ink-only", label: "Anthracite uniquement" }]
          } />
        
        <TweakSelect
          label="Police titres"
          value={tweaks.displayFont}
          onChange={(v) => setTweak("displayFont", v)}
          options={[
          { value: "peace-sans", label: "Peace Sans (brand)" },
          { value: "boldonse", label: "Boldonse" },
          { value: "big-shoulders", label: "Big Shoulders" },
          { value: "instrument", label: "Instrument Serif" },
          { value: "space-grotesk", label: "Space Grotesk" }]
          } />
        
      </TweakSection>
      <TweakSection label="Animations">
        <TweakRadio
          label="Intensité"
          value={tweaks.animIntensity}
          onChange={(v) => setTweak("animIntensity", v)}
          options={[
          { value: "subtle", label: "Subtile" },
          { value: "marked", label: "Marquée" },
          { value: "bold", label: "Audacieuse" }]
          } />
        
        <TweakToggle
          label="Sphères 3D"
          value={tweaks.show3DBg}
          onChange={(v) => setTweak("show3DBg", v)} />
        
      </TweakSection>
    </TweaksPanel>);

}

// ---------- App root ----------
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  useReveal();

  // Apply CSS variables based on tweaks
  useEffect(() => {
    const [from, to] = GRADIENTS[tweaks.gradient] || GRADIENTS["magenta-blue"];
    document.documentElement.style.setProperty("--grad-from", from);
    document.documentElement.style.setProperty("--grad-to", to);
    document.documentElement.style.setProperty("--gradient", `linear-gradient(135deg, ${from} 0%, ${to} 100%)`);
    document.documentElement.style.setProperty("--font-display", FONTS[tweaks.displayFont] || FONTS.boldonse);
    const animScale = tweaks.animIntensity === "subtle" ? 0.6 : tweaks.animIntensity === "bold" ? 1.4 : 1;
    document.documentElement.style.setProperty("--anim-scale", animScale);
  }, [tweaks]);

  return (
    <>
      <BgSpheres enabled={tweaks.show3DBg} intensity={tweaks.animIntensity} />
      <Nav />
      <HeroB />
      <Marquee />
      <Why />
      <Pillars />
      <Team />
      <Contact />
      <Footer />
      <TweaksUI tweaks={tweaks} setTweak={setTweak} />
    </>);

}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
