<style>
@font-face {
  font-family: "Peace Sans";
  src: url("/fonts/peace_sans.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
    :root {
    --bg: #FAFAF7;
    --ink: #0A0A0A;
    --ink-2: #1A1A1A;
    --muted: #6B6B6B;
    --line: #E8E8E3;
    --line-strong: #D4D4CE;
    --grad-from: #b80050;
    --grad-to: #3c00cf;
    --gradient: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-to) 100%);
    --font-display: "Peace Sans", "Boldonse", "Big Shoulders Display", "Helvetica Neue", sans-serif;
    --font-body: "Poppins", system-ui, sans-serif;
    --anim-scale: 1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  body { font-weight: 400; line-height: 1.5; }
  ::selection { background: var(--grad-from); color: white; }

  /* utility */
  .grad-text {
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .grad-bg { background: var(--gradient); }
  .grad-pill-text {
    background: var(--gradient);
    color: white;
    padding: 0 0.18em;
    border-radius: 0.12em;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  /* reveal — defaults to visible; JS adds .pre-reveal to hide, then .in to show */
  .reveal { transition: opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1); transition-delay: var(--d, 0ms); }
  .reveal.pre-reveal { opacity: 0; transform: translateY(28px); }
  .reveal.in { opacity: 1; transform: none; }

  /* 3D bg objects */
  .bg-spheres {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(86px);
    opacity: 0.22;
    will-change: transform, opacity;
    transition: opacity 350ms ease-out;
  }
  body.spheres-dim .sphere { opacity: 0; }
  .s1 { width: 750px; height: 750px; left: -160px; top: 6vh; background: radial-gradient(circle at 30% 30%, #ff4d97, #b80050 60%, transparent 70%); }
  .s2 { width: 980px; height: 980px; right: -260px; top: 78vh; background: radial-gradient(circle at 30% 30%, #6a4dff, #3c00cf 60%, transparent 70%); }
  .s3 { width: 605px; height: 605px; left: 36vw; top: 220vh; background: radial-gradient(circle at 30% 30%, #c0a8ff, #3c00cf 60%, transparent 70%); }
  .s4 { width: 520px; height: 520px; right: 8vw; top: 360vh; background: radial-gradient(circle at 30% 30%, #ff9ec5, #b80050 60%, transparent 70%); }

  /* main container above bg */
  #app { position: relative; z-index: 1; }

  /* nav */
  header.nav {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    display: flex; align-items: center; gap: 24px;
    padding: 10px 14px 10px 18px;
    background: rgba(250, 250, 247, 0.72);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(10,10,10,0.06);
    border-radius: 100px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }
  .nav .logo { display: inline-flex; align-items: center; }
  .nav .logo img { height: 26px; width: auto; display: block; }
  .nav a { color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 500; }
  .nav a:hover { opacity: 0.6; }
  .nav .cta {
    background: var(--ink); color: white; padding: 8px 16px; border-radius: 100px; font-size: 13px;
  }
  .nav .cta:hover { opacity: 1; background: var(--ink-2); }

  /* iPhone frame */
  .iphone {
    width: 320px; aspect-ratio: 9/19.5;
    background: #0a0a0a;
    border-radius: 48px;
    padding: 12px;
    box-shadow:
      0 0 0 2px #2a2a2a,
      0 30px 60px -15px rgba(0,0,0,0.35),
      0 80px 100px -50px rgba(184,0,80,0.25),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
  }
  .iphone .screen {
    width: 100%; height: 100%;
    background: white;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
  }
  .iphone .notch {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px;
    background: #0a0a0a;
    border-radius: 100px;
    z-index: 5;
  }
  .iphone iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }
  .iphone .side-btn {
    position: absolute; left: -2px; width: 4px; background: #2a2a2a;
  }
  .iphone .side-btn.b1 { top: 110px; height: 36px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.b2 { top: 160px; height: 60px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.b3 { top: 230px; height: 60px; border-radius: 2px 0 0 2px; }
  .iphone .side-btn.r1 { right: -2px; left: auto; top: 180px; height: 90px; border-radius: 0 2px 2px 0; }


  /* Why — full-width editorial */
  .why-grid {
    padding: 96px 60px;
    display: flex; flex-direction: column;
    gap: 72px;
    align-items: stretch;
  }
  .why-head { max-width: 900px; }
  .why-head h2 {
    font-family: var(--font-display);
    font-size: clamp(40px, 5.2vw, 72px);
    line-height: 0.92;
    letter-spacing: -0.025em;
  }
  .why-block {
    display: flex; flex-direction: column;
    max-width: 1200px;
  }
  .why-block .num {
    font-family: "Space Grotesk", monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: block;
  }
  .why-block .block-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.4vw, 48px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 20px 0;
  }
  .why-block p { margin: 0; }
  .why-block p.constat {
    font-size: clamp(20px, 1.9vw, 28px);
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: var(--ink-2);
    max-width: 800px;
    font-weight: 400;
  }
  .why-block p.lede {
    font-size: clamp(17px, 1.4vw, 21px);
    line-height: 1.5;
    color: var(--ink);
    max-width: 800px;
    letter-spacing: -0.005em;
  }
  .why-quote {
    position: relative;
    padding-left: 32px;
    margin: 32px 0;
    font-family: var(--font-display);
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    max-width: 900px;
  }
  .why-quote::before {
    content: "";
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 4px;
    background: linear-gradient(180deg, #B90051, #3C00CF);
    border-radius: 2px;
  }
  .why-quote-attr {
    display: block;
    margin-top: 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .mosaic {
    display: grid;
    gap: 12px;
    height: 480px;
    margin-top: 16px;
  }
  .mosaic-left-big {
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .mosaic-left-big .m-1 { grid-row: 1 / span 2; grid-column: 1; }
  .mosaic-left-big .m-2 { grid-row: 1; grid-column: 2; }
  .mosaic-left-big .m-3 { grid-row: 2; grid-column: 2; }
  .mosaic-right-big {
    grid-template-columns: 1fr 2fr;
    grid-template-rows: 1fr 1fr;
  }
  .mosaic-right-big .m-1 { grid-row: 1; grid-column: 1; }
  .mosaic-right-big .m-2 { grid-row: 2; grid-column: 1; }
  .mosaic-right-big .m-3 { grid-row: 1 / span 2; grid-column: 2; }
  .mosaic figure {
    margin: 0;
    border-radius: 20px;
    overflow: hidden;
    background: #ebebe5;
  }
  .mosaic img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  @media (max-width: 900px) {
    .why-grid { padding: 56px 20px; gap: 48px; }
    .mosaic {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      height: auto;
    }
    .mosaic figure { height: 220px; }
    .mosaic-left-big .m-1, .mosaic-left-big .m-2, .mosaic-left-big .m-3,
    .mosaic-right-big .m-1, .mosaic-right-big .m-2, .mosaic-right-big .m-3 {
      grid-column: 1; grid-row: auto;
    }
    .why-quote { padding-left: 20px; margin: 24px 0; }
  }
  .stabilo {
    background: linear-gradient(90deg, var(--grad-from), var(--grad-to));
    color: #fff;
    -webkit-text-fill-color: #fff;
    padding: 0.05em 0.22em;
    border-radius: 0.18em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    font-weight: 500;
  }
  /* Pillars */
  .pillars {
    padding: 80px 60px;
  }
  .pillars-head { display: flex; align-items: end; justify-content: space-between; gap: 40px; margin-bottom: 48px; }
  .pillars-head h2 {
    font-family: var(--font-display);
    font-size: clamp(42px, 5vw, 88px);
    line-height: 0.88;
    letter-spacing: -0.03em;
    max-width: 14ch;
  }
  .pillars-head .meta { font-family: "Space Grotesk", monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.12em; min-width: 200px; text-align: right; }
  .pillar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .pillar {
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 32px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    min-height: 460px;
    display: flex; flex-direction: column;
    position: relative;
    transition: transform 0.6s cubic-bezier(.2,.7,.2,1), box-shadow 0.6s, border-color 0.4s;
    overflow: hidden;
  }
  .pillar:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 60px -20px rgba(184,0,80,0.18), 0 20px 40px -25px rgba(60,0,207,0.18);
    border-color: transparent;
  }
  .pillar::before {
    content: ""; position: absolute; inset: 0; padding: 1px; border-radius: 28px;
    background: var(--gradient);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  .pillar:hover::before { opacity: 1; }
  .pillar .idx {
    font-family: "Space Grotesk", monospace; font-size: 12px; letter-spacing: 0.15em; color: var(--muted);
  }
  .pillar h3 {
    font-family: var(--font-display);
    font-size: 28px; line-height: 1.1; letter-spacing: -0.02em;
    margin-top: 24px;
    flex: 1;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
  }
  .pillar p {
    color: var(--muted); font-size: 15px; line-height: 1.55;
    margin-top: 24px;
  }
  .pillar .visual {
    margin-top: 28px;
    height: 160px;
    border-radius: 18px;
    background: linear-gradient(135deg, #f5f5f0 0%, #ebebe5 100%);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  @media (max-width: 900px){
    .pillars { padding: 56px 20px; }
    .pillar-grid { grid-template-columns: 1fr; }
    .pillar { min-height: auto; padding: 24px; }
    .pillar h3 { font-size: 24px; }
  }

  /* Team */
  .team { padding: 80px 60px; border-top: 1px solid var(--line); }
  .team h2 {
    font-family: var(--font-display);
    font-size: clamp(42px, 5vw, 88px);
    line-height: 0.88;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .team .intro { max-width: 60ch; font-size: 18px; color: var(--muted); margin-bottom: 48px; }
  .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .person {
    aspect-ratio: 3/4;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 24px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: rgba(255,255,255,0.5);
    transition: transform 0.5s, background 0.4s;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .person:hover {
    transform: translateY(-6px);
    background: var(--ink);
    color: var(--bg);
  }
  .person:hover .role { color: rgba(255,255,255,0.6); }
  .person .name { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em; line-height: 1; }
  .person .age { font-family: "Space Grotesk", monospace; font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.1em; }
  .person:hover .age { color: rgba(255,255,255,0.5); }
  .person .role { font-size: 14px; line-height: 1.4; color: var(--ink-2); transition: color 0.4s; max-width: 18ch; }
  .person .li {
    font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; opacity: 0.5;
    display: flex; align-items: center; gap: 6px;
  }
  .person:hover .li { opacity: 1; }
  @media (max-width: 900px){
    .team { padding: 56px 20px; }
    .team-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .person { padding: 18px; border-radius: 18px; }
    .person .name { font-size: 22px; }
  }

  /* Contact */
  .contact {
    padding: 80px 60px;
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  }
  .contact h2 {
    font-family: var(--font-display);
    font-size: clamp(36px, 4.2vw, 68px);
    line-height: 0.88;
    letter-spacing: -0.02em;
  }
  .contact .sub { color: var(--muted); font-size: 17px; line-height: 1.5; margin-top: 24px; max-width: 40ch; }
  .form { display: flex; flex-direction: column; gap: 4px; }
  .form .field {
    border-bottom: 1px solid var(--line);
    padding: 18px 0 14px;
  }
  .form label {
    font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
    display: block; margin-bottom: 6px;
  }
  .form input, .form textarea {
    width: 100%; border: 0; background: transparent;
    font-family: var(--font-body); font-size: 17px;
    outline: none; color: var(--ink);
    resize: none;
  }
  .form .field:focus-within { border-bottom-color: var(--ink); }
  .form button {
    margin-top: 24px;
    background: var(--ink); color: white;
    border: 0; border-radius: 100px;
    padding: 18px 28px;
    font-family: var(--font-body); font-size: 15px; font-weight: 500;
    cursor: pointer;
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 10px;
    transition: transform 0.3s, background 0.3s;
  }
  .form button:hover { transform: translateY(-2px); background: var(--ink-2); }
  .form button .arrow { transition: transform 0.3s; }
  .form button:hover .arrow { transform: translateX(4px); }
  @media (max-width: 900px){
    .contact { grid-template-columns: 1fr; padding: 56px 20px; gap: 32px; }
  }

  /* Footer */
  footer {
    padding: 40px 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: end; gap: 40px;
    flex-wrap: wrap;
  }
  footer .big { font-family: var(--font-display); font-size: clamp(80px, 14vw, 240px); line-height: 0.85; letter-spacing: -0.05em; }
  footer .meta { font-size: 13px; color: var(--muted); }
  footer .links { display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
  footer .links a { color: var(--ink); text-decoration: none; }
  footer .links a:hover { color: var(--muted); }

  /* CTA buttons */
  .cta-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--ink); color: white;
    padding: 16px 24px; border-radius: 100px;
    font-size: 15px; font-weight: 500;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 12px;
    cursor: pointer; border: 0;
    transition: transform 0.3s, background 0.3s;
    font-family: var(--font-body);
  }
  .btn-primary:hover { transform: translateY(-2px); background: var(--ink-2); }
  .btn-primary .arrow { transition: transform 0.3s; }
  .btn-primary:hover .arrow { transform: translateX(4px); }
  .arrow-mobile { display: none; }
  .btn-secondary {
    background: transparent; color: var(--ink);
    padding: 14px 22px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    text-decoration: none;
    border: 1px solid var(--line-strong);
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 0.3s, border-color 0.3s;
    font-family: var(--font-body);
  }
  .btn-secondary:hover { background: var(--ink); color: white; border-color: var(--ink); }
